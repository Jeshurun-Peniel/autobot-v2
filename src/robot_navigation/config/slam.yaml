slam_toolbox:
  ros__parameters:

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # Topics
    scan_topic: /scan
    odom_topic: /diff_drive_controller/odom

    # Timing
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Mapping parameters
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.5

    # Motion limits
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1

    mode: mapping